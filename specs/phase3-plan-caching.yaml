# Spec 1011: SpecTemplateStore — verified specs become reusable plan templates

issue_number: 1011
title: "SpecTemplateStore for plan reuse across similar issues"
status: active
complexity: L

protocols_touched:
  - SpecStore

files_touched:
  - src/stronghold/builders/spec_templates.py
  - src/stronghold/protocols/spec.py
  - tests/builders/test_spec_templates.py

acceptance_criteria:
  - "SpecTemplateStore.save_template() stores a verified Spec as a reusable template"
  - "Templates are keyed by issue class (auth, dependency, refactor, test, protocol)"
  - "SpecTemplateStore.match() finds the best template for a new issue"
  - "Matching uses title/acceptance_criteria similarity"
  - "Matched template can be adapted (new issue_number, new title)"
  - "adapt() preserves invariant structure but updates issue-specific fields"
  - "No match returns None, falling back to fresh emit_spec()"

invariants:
  - name: template_preserves_invariants
    description: "Adapted template keeps the same invariant structure"
    kind: postcondition
    expression: "len(adapted.invariants) == len(template.invariants)"
    severity: high

  - name: adapted_has_new_identity
    description: "Adapted spec has the new issue_number and title"
    kind: postcondition
    expression: "adapted.issue_number == new_issue_number"
    severity: critical

  - name: no_match_returns_none
    description: "When no template matches, returns None"
    kind: postcondition
    expression: "match('unrelated') is None"
    severity: high

  - name: verified_only
    description: "Only specs with VERIFIED status can become templates"
    kind: precondition
    expression: "spec.status == SpecStatus.VERIFIED"
    severity: critical
