apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: stronghold
data:
  001_initial.sql: |
    CREATE EXTENSION IF NOT EXISTS vector;
    CREATE EXTENSION IF NOT EXISTS pg_trgm;
    
    CREATE TABLE IF NOT EXISTS prompts (
        id SERIAL PRIMARY KEY,
        name TEXT NOT NULL,
        version INTEGER NOT NULL,
        label TEXT,
        content TEXT NOT NULL,
        config JSONB NOT NULL DEFAULT '{}',
        created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        created_by TEXT NOT NULL DEFAULT 'system',
        UNIQUE(name, version)
    );
    CREATE INDEX IF NOT EXISTS idx_prompts_name ON prompts (name);
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: stronghold
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: pgvector/pgvector:pg17
          env:
            - name: POSTGRES_USER
              value: stronghold
            - name: POSTGRES_PASSWORD
              value: stronghold
            - name: POSTGRES_DB
              value: stronghold
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: init-scripts
          configMap:
            name: postgres-init
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: stronghold
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
