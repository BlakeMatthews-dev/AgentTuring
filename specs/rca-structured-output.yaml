# Spec A: Structured cause taxonomy on Learning + RCAExtractor

issue_number: TBD
title: "Structured RCA output: taxonomy + prevention fields on Learning"
status: active
complexity: M

protocols_touched:
  - RCAExtractor

files_touched:
  - src/stronghold/types/memory.py
  - src/stronghold/memory/learnings/extractor.py
  - src/stronghold/agents/context_builder.py
  - tests/memory/test_extractor_extended.py

acceptance_criteria:
  - "Learning dataclass gains rca_category: str | None and rca_prevention: str fields, both optional with safe defaults"
  - "RCAExtractor.extract_rca() populates rca_category from a fixed vocabulary: missing_precondition | tool_contract_mismatch | permission_gap | rate_limit | input_validation | ambiguous_intent | unknown"
  - "RCAExtractor prompt instructs the LLM to emit CATEGORY: <enum>\\nROOT CAUSE: <sentence>\\nPREVENTION: <sentence> and parses each line"
  - "Malformed LLM output falls back to rca_category='unknown' with rca_prevention='' and the full text preserved in learning"
  - "context_builder renders rca_category as a tag in the promoted learnings XML block when present"
  - "Existing non-RCA Learning instances (category='tool_correction' | 'positive_pattern') are unaffected"

invariants:
  - name: taxonomy_closed
    description: "rca_category is always None or one of the fixed vocabulary values"
    kind: postcondition
    expression: "rca_category in (None, 'missing_precondition', 'tool_contract_mismatch', 'permission_gap', 'rate_limit', 'input_validation', 'ambiguous_intent', 'unknown')"
    severity: critical

  - name: malformed_is_unknown
    description: "LLM output that does not match the expected format yields category='unknown', never raises"
    kind: postcondition
    expression: "malformed_llm_response -> rca_category == 'unknown' and no exception"
    severity: high

  - name: backward_compatible_learning
    description: "Existing learnings with no RCA fields continue to round-trip through store and find_relevant"
    kind: postcondition
    expression: "legacy Learning without rca_* fields -> store/retrieve unchanged"
    severity: critical
---
# Spec B: LearningsConfig

issue_number: TBD
title: "LearningsConfig section: rca_enabled, rca_model, promotion_threshold"
status: active
complexity: S

protocols_touched: []

files_touched:
  - src/stronghold/types/config.py
  - src/stronghold/container.py
  - src/stronghold/memory/learnings/promoter.py
  - config/example.yaml

acceptance_criteria:
  - "New LearningsConfig(BaseModel) added to types/config.py with: rca_enabled: bool = True, rca_model: str = '', promotion_threshold: int = 5"
  - "StrongholdConfig gains learnings: LearningsConfig = Field(default_factory=LearningsConfig)"
  - "container.py wires config.learnings.promotion_threshold into LearningPromoter instead of the hardcoded 5"
  - "container.py skips RCAExtractor construction when config.learnings.rca_enabled is False"
  - "config.learnings.rca_model passed through to RCAExtractor constructor (empty string means 'use default routing')"
  - "config/example.yaml shows a commented-out learnings: block documenting the knobs"

invariants:
  - name: default_unchanged
    description: "A config file with no learnings: section produces the same runtime behavior as today"
    kind: postcondition
    expression: "StrongholdConfig() == StrongholdConfig(learnings=LearningsConfig()) -> identical promoter threshold, RCA enabled"
    severity: critical

  - name: rca_disabled_means_silent
    description: "rca_enabled=False disables RCA entirely; no learnings with category='rca' are stored"
    kind: postcondition
    expression: "rca_enabled=False -> RCAExtractor not constructed -> no rca learnings persisted"
    severity: high
