<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stronghold — The Arena</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root { --stone-dark:#1a1a2e; --stone-mid:#16213e; --stone-light:#1e2d4a; --iron:#4a4a5a; --iron-light:#6b6b7b; --gold:#e2a529; --gold-dim:#c9a227; --gold-bright:#f4c430; --parchment:#f5f0e1; --blood:#8b2500; --emerald:#2d6a4f; --silver:#c0c0c0; --bronze:#cd7f32; }
  body { background: linear-gradient(135deg, var(--stone-dark), var(--stone-mid)); color: #d4d0c8; font-family: 'JetBrains Mono', monospace; min-height: 100vh; }
  h1,h2,h3 { font-family: 'Playfair Display', Georgia, serif; color: var(--gold); }
  .sidebar { background: linear-gradient(180deg, #0d1321, #1a1a2e); border-right: 2px solid var(--iron); width: 240px; min-height: 100vh; }
  .sidebar-item { padding: 12px 20px; cursor: pointer; transition: all 0.2s; border-left: 3px solid transparent; display: flex; align-items: center; gap: 10px; color: #8b8b9b; font-size: 0.85rem; text-decoration: none; }
  .sidebar-item:hover { background: rgba(226,165,41,0.08); color: var(--gold-dim); border-left-color: var(--gold-dim); }
  .sidebar-item.active { background: rgba(226,165,41,0.12); color: var(--gold); border-left-color: var(--gold); }
  .card { background: var(--stone-light); border: 1px solid var(--iron); border-radius: 8px; }
  select { background: var(--stone-dark); border: 1px solid var(--iron); color: var(--parchment); border-radius: 6px; padding: 6px 10px; font-family: inherit; font-size: 0.8rem; }

  /* Podium */
  .podium { display: flex; align-items: flex-end; justify-content: center; gap: 12px; padding: 24px 0; }
  .podium-spot { text-align: center; border-radius: 8px; padding: 16px 12px; min-width: 100px; }
  .podium-1 { background: linear-gradient(180deg, rgba(226,165,41,0.15), rgba(226,165,41,0.05)); border: 1px solid var(--gold-dim); min-height: 180px; }
  .podium-2 { background: linear-gradient(180deg, rgba(192,192,192,0.12), rgba(192,192,192,0.04)); border: 1px solid rgba(192,192,192,0.3); min-height: 150px; }
  .podium-3 { background: linear-gradient(180deg, rgba(205,127,50,0.12), rgba(205,127,50,0.04)); border: 1px solid rgba(205,127,50,0.3); min-height: 130px; }
  .podium-avatar { width: 56px; height: 56px; border-radius: 50%; margin: 0 auto 8px; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
  .podium-1 .podium-avatar { border: 2px solid var(--gold); width: 64px; height: 64px; }
  .podium-2 .podium-avatar { border: 2px solid var(--silver); }
  .podium-3 .podium-avatar { border: 2px solid var(--bronze); }
  .podium-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .podium-medal { font-size: 1.8rem; margin-bottom: 4px; }

  /* Table */
  .lb-row { display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-bottom: 1px solid rgba(74,74,90,0.3); transition: background 0.15s; }
  .lb-row:hover { background: rgba(226,165,41,0.04); }
  .lb-row:last-child { border-bottom: none; }
  .lb-rank { width: 32px; text-align: center; font-weight: 700; font-family: 'Playfair Display', serif; }
  .lb-avatar { width: 36px; height: 36px; border-radius: 50%; overflow: hidden; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 1rem; border: 1px solid var(--iron); }
  .lb-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .lb-info { flex: 1; min-width: 0; }
  .lb-name { font-size: 0.85rem; font-weight: 500; }
  .lb-meta { font-size: 0.65rem; color: var(--iron-light); }
  .lb-stats { text-align: right; flex-shrink: 0; }
  .lb-pts { font-size: 0.9rem; font-weight: 700; font-family: 'Playfair Display', serif; color: var(--gold); }
  .lb-level { font-size: 0.65rem; color: var(--iron-light); }

  .xp-mini { height: 4px; border-radius: 2px; background: rgba(74,74,90,0.3); width: 80px; overflow: hidden; display: inline-block; vertical-align: middle; margin-left: 6px; }
  .xp-mini-fill { height: 100%; border-radius: 2px; background: var(--gold-dim); }

  ::-webkit-scrollbar { width: 8px; } ::-webkit-scrollbar-track { background: var(--stone-dark); } ::-webkit-scrollbar-thumb { background: var(--iron); border-radius: 4px; }
  .sidebar-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:999; }
  .sidebar-overlay.open { display:block; }
  .mobile-menu-btn { display: none; background: none; border: none; color: var(--gold); font-size: 1.5rem; cursor: pointer; }
  @media (max-width: 768px) {
    .sidebar { position:fixed; top:0; left:-260px; z-index:1000; width:260px; height:100vh; height:100dvh; transition:left 0.3s; box-shadow:4px 0 20px rgba(0,0,0,0.5); }
    .sidebar.open { left:0; }
    .mobile-menu-btn { display:block; }
    .px-8 { padding-left: 1rem !important; padding-right: 1rem !important; }
    .podium { flex-wrap: wrap; }
    .podium-spot { min-width: 80px; min-height: auto !important; padding: 12px 8px; }
    .podium-avatar { width: 44px !important; height: 44px !important; }
    select { font-size: 16px !important; }
  }
</style>
<script src="/dashboard/auth.js"></script>
</head>
<body class="flex">
<div class="sidebar-overlay" id="sidebar-overlay" role="button" onclick="closeSidebar()"></div>
<nav class="sidebar flex-shrink-0 flex flex-col" id="sidebar">
  <div class="p-5 border-b border-[var(--iron)]"><div class="flex items-center gap-3"><span class="tower-crest" style="font-size:2rem;text-shadow:0 0 20px rgba(226,165,41,0.4)">&#x1F3F0;</span><div><h1 class="text-lg leading-tight">Stronghold</h1><p class="text-xs text-[var(--iron-light)]">Agent Governance Platform</p></div></div></div>
  <div class="flex-1 py-4">
    <a href="/greathall" class="sidebar-item"><span style="width:24px;text-align:center">&#x1F3DB;</span> Great Hall</a>
    <a href="/dashboard/agents" class="sidebar-item"><span style="width:24px;text-align:center">&#x2694;</span> Knights</a>
    <a href="/dashboard/skills" class="sidebar-item"><span style="width:24px;text-align:center">&#x1F6E1;</span> Armory</a>
    <a href="/dashboard/mcp" class="sidebar-item"><span style="width:24px;text-align:center">&#x1F525;</span> Forge</a>
    <a href="/dashboard/security" class="sidebar-item"><span style="width:24px;text-align:center">&#x1F5FC;</span> Watchtower</a>
    <a href="/dashboard/outcomes" class="sidebar-item"><span style="width:24px;text-align:center">&#x1F4B0;</span> Treasury</a>
    <a href="/dashboard/quota" class="sidebar-item"><span style="width:24px;text-align:center">&#x2696;</span> Ledger</a>
    <a href="/prompts" class="sidebar-item"><span style="width:24px;text-align:center">&#x1F4DC;</span> Scrolls</a>
  </div>
  <div class="py-2 border-t border-[var(--iron)]">
    <a href="/dashboard/profile" class="sidebar-item"><span style="width:24px;text-align:center">&#x1F464;</span> Profile</a>
  </div>
  <div class="p-4 border-t border-[var(--iron)] text-xs text-[var(--iron-light)]">
    <div class="flex justify-between items-center"><span>v0.1.0</span><a href="/logout" onclick="strongholdLogout();return false" style="color:var(--iron-light);text-decoration:none;transition:color 0.2s" class="sh-logout">Logout</a></div>
  </div>
</nav>

<main class="flex-1 overflow-auto">
  <header class="px-8 py-6 border-b border-[var(--iron)]">
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-3">
        <button class="mobile-menu-btn" onclick="openSidebar()">&#x2630;</button>
        <div>
          <h2 class="text-2xl">&#x1F3C6; The Arena</h2>
          <p class="text-sm text-[var(--iron-light)] mt-1">Champions of the realm, ranked by token mastery</p>
        </div>
      </div>
      <select id="time-filter" onchange="loadLeaderboard()">
        <option value="0">All Time</option>
        <option value="7">Last 7 Days</option>
        <option value="30">Last 30 Days</option>
        <option value="90">Last 90 Days</option>
      </select>
    </div>
  </header>

  <!-- Podium (top 3) -->
  <div class="px-8">
    <div class="podium" id="podium">
      <div class="text-center text-sm text-[var(--iron-light)] py-8 w-full sh-loading">&#x1F3C6; Assembling the champions...</div>
    </div>
  </div>

  <!-- Full Rankings -->
  <div class="px-8 pb-8">
    <div class="card">
      <div class="p-4 border-b border-[var(--iron)]">
        <h3 class="text-base">Full Rankings</h3>
      </div>
      <div id="rankings" class="max-h-[600px] overflow-y-auto">
        <div class="text-center text-sm text-[var(--iron-light)] py-8">Loading...</div>
      </div>
    </div>
  </div>
</main>

<script>
var MEDALS = ['&#x1F947;', '&#x1F948;', '&#x1F949;'];
var RANK_COLORS = ['var(--gold)', 'var(--silver)', 'var(--bronze)'];

function avatarEl(data, size) {
  if (data) {
    var img = document.createElement('img');
    img.src = data;
    img.alt = '';
    return img;
  }
  var span = document.createElement('span');
  span.textContent = '\u{1F464}';
  span.style.background = 'rgba(226,165,41,0.08)';
  span.style.width = '100%';
  span.style.height = '100%';
  span.style.display = 'flex';
  span.style.alignItems = 'center';
  span.style.justifyContent = 'center';
  return span;
}

async function loadLeaderboard() {
  var days = document.getElementById('time-filter').value;
  try {
    var resp = await fetch('/v1/stronghold/leaderboard?days=' + days + '&limit=50', {headers: authHeaders()});
    if (!resp.ok) return;
    var data = await resp.json();
    var entries = data.entries || [];

    // Podium (top 3)
    var podiumEl = document.getElementById('podium');
    podiumEl.textContent = '';

    if (entries.length === 0) {
      podiumEl.innerHTML = strongholdEmptyState('&#x1F3C6;', 'The arena awaits', 'No champions yet. Complete missions to earn points and climb the ranks.', 'Start a Mission', '/greathall');
      document.getElementById('rankings').innerHTML = '';
      return;
    }

    // Podium order: 2nd, 1st, 3rd
    var podiumOrder = [];
    if (entries.length >= 2) podiumOrder.push({entry: entries[1], place: 2});
    if (entries.length >= 1) podiumOrder.push({entry: entries[0], place: 1});
    if (entries.length >= 3) podiumOrder.push({entry: entries[2], place: 3});

    podiumOrder.forEach(function(item) {
      var e = item.entry;
      var p = item.place;
      var spot = document.createElement('div');
      spot.className = 'podium-spot podium-' + p;

      var medal = document.createElement('div');
      medal.className = 'podium-medal';
      medal.innerHTML = MEDALS[p - 1];
      spot.appendChild(medal);

      var av = document.createElement('div');
      av.className = 'podium-avatar';
      av.appendChild(avatarEl(e.avatar_data));
      spot.appendChild(av);

      var name = document.createElement('div');
      name.className = 'text-sm font-bold';
      name.style.color = RANK_COLORS[p - 1];
      name.textContent = e.display_name;
      spot.appendChild(name);

      var rank = document.createElement('div');
      rank.style.cssText = 'font-size:0.7rem;color:var(--iron-light);margin-top:2px';
      rank.textContent = 'Lvl ' + e.level + ' ' + e.rank_name;
      spot.appendChild(rank);

      var pts = document.createElement('div');
      pts.style.cssText = 'font-size:1.2rem;font-weight:700;font-family:Playfair Display,serif;margin-top:8px';
      pts.style.color = RANK_COLORS[p - 1];
      pts.textContent = e.points.toLocaleString();
      spot.appendChild(pts);

      var label = document.createElement('div');
      label.style.cssText = 'font-size:0.6rem;color:var(--iron-light)';
      label.textContent = 'points';
      spot.appendChild(label);

      podiumEl.appendChild(spot);
    });

    // Full rankings table
    var rankEl = document.getElementById('rankings');
    rankEl.textContent = '';

    entries.forEach(function(e) {
      var row = document.createElement('div');
      row.className = 'lb-row';

      var rankNum = document.createElement('div');
      rankNum.className = 'lb-rank';
      if (e.rank <= 3) rankNum.innerHTML = MEDALS[e.rank - 1];
      else { rankNum.textContent = '#' + e.rank; rankNum.style.color = 'var(--iron-light)'; }

      var av = document.createElement('div');
      av.className = 'lb-avatar';
      av.appendChild(avatarEl(e.avatar_data));

      var info = document.createElement('div');
      info.className = 'lb-info';
      var nameSpan = document.createElement('div');
      nameSpan.className = 'lb-name';
      nameSpan.style.color = 'var(--parchment)';
      nameSpan.textContent = e.display_name;
      var metaSpan = document.createElement('div');
      metaSpan.className = 'lb-meta';
      metaSpan.textContent = e.rank_name + ' (Lvl ' + e.level + ') \u2022 ' + e.team_id + ' \u2022 ' + e.requests.toLocaleString() + ' requests \u2022 ' + (e.success_rate * 100).toFixed(0) + '% success';
      info.appendChild(nameSpan);
      info.appendChild(metaSpan);

      var stats = document.createElement('div');
      stats.className = 'lb-stats';
      var ptsDiv = document.createElement('div');
      ptsDiv.className = 'lb-pts';
      ptsDiv.textContent = e.points.toLocaleString() + ' pts';
      var tokDiv = document.createElement('div');
      tokDiv.className = 'lb-level';
      tokDiv.textContent = e.total_tokens.toLocaleString() + ' tokens';
      stats.appendChild(ptsDiv);
      stats.appendChild(tokDiv);

      row.appendChild(rankNum);
      row.appendChild(av);
      row.appendChild(info);
      row.appendChild(stats);
      rankEl.appendChild(row);
    });
  } catch(e) {
    document.getElementById('rankings').innerHTML = '<div class="text-center text-[var(--blood)] py-4">Failed to load leaderboard</div>';
  }
}

loadLeaderboard();

function openSidebar() { document.getElementById('sidebar').classList.add('open'); document.getElementById('sidebar-overlay').classList.add('open'); }
function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebar-overlay').classList.remove('open'); }
</script>
</body>
</html>
