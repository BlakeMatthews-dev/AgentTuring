{{- if and .Values.networkPolicy.enabled .Values.redis.enabled }}
# NetworkPolicy for Redis pods.
#
# Ingress: only from stronghold-api on port 6379.
# Egress: DNS only — Redis has no reason to initiate external connections.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-redis
  namespace: {{ include "stronghold.namespace" . }}
  labels:
    {{- include "stronghold.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  podSelector:
    matchLabels:
      {{- include "stronghold.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: redis
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "stronghold.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: stronghold-api
      ports:
        - port: 6379
          protocol: TCP
  egress:
    # DNS only
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
{{- end }}
