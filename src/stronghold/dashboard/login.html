<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stronghold — Enter the Gates</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --stone-dark: #1a1a2e;
    --stone-mid: #16213e;
    --stone-light: #1e2d4a;
    --iron: #4a4a5a;
    --iron-light: #6b6b7b;
    --gold: #e2a529;
    --gold-dim: #c9a227;
    --gold-bright: #f4c430;
    --parchment: #f5f0e1;
    --blood: #8b2500;
    --emerald: #2d6a4f;
  }
  body {
    background: linear-gradient(135deg, #0d0d1a 0%, var(--stone-dark) 40%, var(--stone-mid) 100%);
    color: #d4d0c8;
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  /* Allow scrolling when card exceeds viewport (register form on mobile) */
  @supports (min-height: 100dvh) { body { min-height: 100dvh; } }

  h1,h2,h3 { font-family: 'Playfair Display', Georgia, serif; color: var(--gold); }

  .gate-card {
    background: linear-gradient(180deg, rgba(30,45,74,0.95) 0%, rgba(26,26,46,0.98) 100%);
    border: 2px solid var(--iron);
    border-top: 3px solid var(--gold-dim);
    border-radius: 12px;
    box-shadow: 0 0 60px rgba(0,0,0,0.5), 0 0 30px rgba(226,165,41,0.08);
    width: 420px;
    max-width: 100%;
    margin: auto;
  }

  .crest { font-size: 3.5rem; text-shadow: 0 0 30px rgba(226,165,41,0.4); }

  /* ── Mobile responsive ── */
  @media (max-width: 480px) {
    body { padding: 0; align-items: flex-start; }
    .gate-card {
      width: 100%; max-width: 100%;
      border-radius: 0; border-left: none; border-right: none;
      min-height: 100vh; min-height: 100dvh;
      display: flex; flex-direction: column; justify-content: center;
    }
    .crest { font-size: 2.5rem; }
    .gate-card h1 { font-size: 1.4rem; }
    /* Tighten horizontal padding */
    .px-8 { padding-left: 1.25rem !important; padding-right: 1.25rem !important; }
    .pt-8 { padding-top: 1.5rem !important; }
    .pb-6 { padding-bottom: 1.25rem !important; }
    /* Larger touch targets */
    input[type=password], input[type=text] { padding: 12px 14px; font-size: 16px; }
    .btn-gold, .btn-sso { padding: 14px 24px; font-size: 1rem; }
    .divider { margin-top: 1rem !important; margin-bottom: 1rem !important; }
  }

  input[type=password], input[type=text] {
    background: var(--stone-dark);
    border: 1px solid var(--iron);
    color: var(--parchment);
    border-radius: 6px;
    padding: 10px 14px;
    width: 100%;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    transition: border-color 0.2s;
  }
  input:focus { border-color: var(--gold); outline: none; box-shadow: 0 0 0 2px rgba(226,165,41,0.2); }

  .btn-gold {
    background: linear-gradient(135deg, var(--gold-dim), var(--gold));
    color: #1a1a2e;
    font-weight: 600;
    cursor: pointer;
    border-radius: 6px;
    padding: 10px 24px;
    border: none;
    font-size: 0.9rem;
    width: 100%;
    transition: all 0.2s;
    font-family: 'JetBrains Mono', monospace;
  }
  .btn-gold:hover { background: linear-gradient(135deg, var(--gold), var(--gold-bright)); box-shadow: 0 0 16px rgba(226,165,41,0.3); }
  .btn-gold:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-sso {
    background: linear-gradient(135deg, var(--stone-light), var(--stone-mid));
    color: var(--parchment);
    font-weight: 500;
    cursor: pointer;
    border-radius: 6px;
    padding: 10px 24px;
    border: 1px solid var(--iron);
    font-size: 0.85rem;
    width: 100%;
    transition: all 0.2s;
    font-family: 'JetBrains Mono', monospace;
  }
  .btn-sso:hover { border-color: var(--gold-dim); background: var(--stone-light); box-shadow: 0 0 12px rgba(226,165,41,0.15); }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    color: var(--iron-light);
    font-size: 0.75rem;
  }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--iron); }

  .error-msg { color: #ff6b6b; font-size: 0.8rem; background: rgba(139,37,0,0.15); border: 1px solid rgba(139,37,0,0.3); border-radius: 6px; padding: 8px 12px; }
  .info-msg { color: #fbbf24; font-size: 0.8rem; background: rgba(226,165,41,0.1); border: 1px solid rgba(226,165,41,0.2); border-radius: 6px; padding: 8px 12px; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .animate-in { animation: fadeIn 0.4s ease; }

  @keyframes pulse-glow { 0%,100% { text-shadow: 0 0 30px rgba(226,165,41,0.4); } 50% { text-shadow: 0 0 50px rgba(226,165,41,0.7); } }
  .crest-pulse { animation: pulse-glow 3s ease-in-out infinite; }
</style>
</head>
<body>

<div class="gate-card animate-in">
  <!-- Header -->
  <div class="text-center pt-8 pb-4 px-8">
    <div class="crest crest-pulse mb-3">&#x1F3F0;</div>
    <h1 class="text-2xl mb-1">The Gates of Stronghold</h1>
    <p class="text-xs text-[var(--iron-light)]">Agent Governance Platform</p>
  </div>

  <!-- Messages area -->
  <div class="px-8">
    <div id="msg-area" class="hidden mb-4"></div>
  </div>

  <!-- SSO section (shown when OIDC is configured) -->
  <div id="sso-section" class="hidden px-8 pb-4">
    <button class="btn-sso" id="sso-btn" onclick="startOIDCLogin()">
      &#x1F511; Sign in with SSO
    </button>
    <div class="divider my-5">or use an API key</div>
  </div>

  <!-- Tab toggle -->
  <div class="flex px-8 pb-2 gap-2">
    <button id="tab-login" onclick="showTab('login')" class="flex-1 text-xs py-2 rounded border border-[var(--gold-dim)] text-[var(--gold)] bg-[rgba(226,165,41,0.1)]">Sign In</button>
    <button id="tab-register" onclick="showTab('register')" class="flex-1 text-xs py-2 rounded border border-[var(--iron)] text-[var(--iron-light)] bg-transparent">Request Access</button>
  </div>

  <!-- Login form (approved users) -->
  <div id="section-login" class="px-8 pb-6">
    <form id="login-form" onsubmit="submitLogin(event)">
      <label class="text-xs text-[var(--iron-light)] mb-2 block">Email</label>
      <input type="text" id="login-email" placeholder="you@example.com" autocomplete="email" autofocus>

      <label class="text-xs text-[var(--iron-light)] mb-2 mt-3 block">Password</label>
      <input type="password" id="login-password" placeholder="Your password" autocomplete="current-password">

      <button type="submit" class="btn-gold mt-4" id="submit-btn">Enter the Fortress</button>
    </form>

    <div class="divider my-5">or use an API key</div>

    <form id="key-form" onsubmit="submitApiKey(event)">
      <input type="password" id="api-key-input" placeholder="sk-stronghold-..." autocomplete="off">
      <button type="submit" class="btn-gold mt-3" style="opacity:0.7;font-size:0.8rem">Use API Key</button>
    </form>
  </div>

  <!-- Register form (new users) -->
  <div id="section-register" class="px-8 pb-6 hidden">
    <form id="register-form" onsubmit="submitRegister(event)">
      <label class="text-xs text-[var(--iron-light)] mb-2 block">Email</label>
      <input type="text" id="reg-email" placeholder="you@company.com" autocomplete="email">

      <label class="text-xs text-[var(--iron-light)] mb-2 mt-3 block">Name</label>
      <input type="text" id="reg-name" placeholder="Your Name" autocomplete="name">

      <label class="text-xs text-[var(--iron-light)] mb-2 mt-3 block">Password</label>
      <input type="password" id="reg-password" placeholder="Choose a password" autocomplete="new-password">

      <label class="text-xs text-[var(--iron-light)] mb-2 mt-3 block">Organization</label>
      <input type="text" id="reg-org" placeholder="your-org">

      <label class="text-xs text-[var(--iron-light)] mb-2 mt-3 block">Team</label>
      <input type="text" id="reg-team" placeholder="your-team" value="default">

      <button type="submit" class="btn-sso mt-4" id="register-btn">Request Access</button>
    </form>
  </div>

  <!-- Footer -->
  <div class="border-t border-[var(--iron)] px-8 py-4 text-center">
    <p class="text-xs text-[var(--iron-light)]">v0.1.0</p>
  </div>
</div>

<script>
'use strict';

var TOKEN_KEY = 'stronghold-token';
var TOKEN_TYPE_KEY = 'stronghold-token-type';
var USER_KEY = 'stronghold-user';
// PKCE state stored in sessionStorage (survives the IdP redirect)
var PKCE_VERIFIER_KEY = 'stronghold-pkce-verifier';
var PKCE_STATE_KEY = 'stronghold-pkce-state';
var PKCE_REDIRECT_KEY = 'stronghold-pkce-redirect';

var serverConfig = null;

// -- Helpers --

function getRedirect() {
  var params = new URLSearchParams(location.search);
  var r = params.get('redirect') || '/greathall';
  // Prevent open redirect — only allow relative paths
  if (r.indexOf('//') !== -1 || r.indexOf(':') !== -1) return '/greathall';
  return r;
}

function showMsg(text, type) {
  var area = document.getElementById('msg-area');
  area.className = (type === 'error' ? 'error-msg' : 'info-msg') + ' mb-4';
  area.textContent = text;
  area.style.display = 'block';
}

// -- Login page is ALWAYS the login page. No auto-redirect. --

(function() {
  var params = new URLSearchParams(location.search);

  // Show reason messages
  var reason = params.get('reason');
  if (reason === 'expired') showMsg('Your session has expired. Please sign in again.', 'info');
  else if (reason === 'unauthorized') showMsg('Authentication required. Please sign in.', 'info');
})();

// -- Load OIDC config + handle callback --

(async function() {
  try {
    var resp = await fetch('/auth/config');
    if (!resp.ok) return;
    serverConfig = await resp.json();

    if (!serverConfig.oidc_enabled) return;

    // Show SSO section
    document.getElementById('sso-section').style.display = 'block';
    document.getElementById('sso-section').classList.remove('hidden');

    // Check if this is an OIDC callback
    if (location.pathname === '/login/callback') {
      await handleOIDCCallback();
    }
  } catch(e) {
    console.error('OIDC setup error:', e);
  }
})();

// -- PKCE utilities (RFC 7636) --

function generateRandomString(length) {
  var chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~';
  var arr = new Uint8Array(length);
  crypto.getRandomValues(arr);
  var result = '';
  for (var i = 0; i < length; i++) result += chars[arr[i] % chars.length];
  return result;
}

async function sha256(plain) {
  var encoder = new TextEncoder();
  return await crypto.subtle.digest('SHA-256', encoder.encode(plain));
}

function base64urlEncode(buffer) {
  var bytes = new Uint8Array(buffer);
  var binary = '';
  for (var i = 0; i < bytes.byteLength; i++) binary += String.fromCharCode(bytes[i]);
  return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}

// -- SSO Login (redirect to IdP) --

async function startOIDCLogin() {
  if (!serverConfig || !serverConfig.oidc_enabled) {
    showMsg('SSO is not configured.', 'error');
    return;
  }

  // Generate PKCE code_verifier + code_challenge
  var verifier = generateRandomString(64);
  var challenge = base64urlEncode(await sha256(verifier));
  var state = generateRandomString(32);

  // Store PKCE state for the callback (survives the IdP redirect)
  sessionStorage.setItem(PKCE_VERIFIER_KEY, verifier);
  sessionStorage.setItem(PKCE_STATE_KEY, state);
  sessionStorage.setItem(PKCE_REDIRECT_KEY, getRedirect());

  // Determine authorization URL (explicit or via issuer discovery)
  var authUrl = serverConfig.authorization_url;
  if (!authUrl && serverConfig.issuer) {
    // OIDC discovery fallback
    try {
      var disc = await fetch(serverConfig.issuer + '/.well-known/openid-configuration');
      var discData = await disc.json();
      authUrl = discData.authorization_endpoint;
    } catch(e) {
      showMsg('Could not discover SSO endpoints.', 'error');
      return;
    }
  }

  if (!authUrl) {
    showMsg('SSO authorization URL not configured.', 'error');
    return;
  }

  location.href = authUrl
    + '?response_type=code'
    + '&client_id=' + encodeURIComponent(serverConfig.client_id)
    + '&redirect_uri=' + encodeURIComponent(location.origin + '/login/callback')
    + '&scope=openid%20profile%20email'
    + '&code_challenge=' + encodeURIComponent(challenge)
    + '&code_challenge_method=S256'
    + '&state=' + encodeURIComponent(state);
}

// -- OIDC Callback (BFF: POST code to backend) --

async function handleOIDCCallback() {
  var params = new URLSearchParams(location.search);

  // IdP error
  if (params.has('error')) {
    showMsg('SSO error: ' + (params.get('error_description') || params.get('error')), 'error');
    return;
  }

  var code = params.get('code');
  if (!code) return;

  // Verify state matches
  var state = params.get('state');
  var savedState = sessionStorage.getItem(PKCE_STATE_KEY);
  if (state !== savedState) {
    showMsg('Invalid state parameter. Please try signing in again.', 'error');
    return;
  }

  var verifier = sessionStorage.getItem(PKCE_VERIFIER_KEY);
  var redirect = sessionStorage.getItem(PKCE_REDIRECT_KEY) || '/';

  if (!verifier) {
    showMsg('Missing PKCE verifier. Please try signing in again.', 'error');
    return;
  }

  showMsg('Completing sign-in...', 'info');
  document.getElementById('submit-btn').disabled = true;

  try {
    // BFF: POST code + verifier to our backend (NOT to the IdP)
    // Backend exchanges server-side, sets HttpOnly cookie
    var resp = await fetch('/auth/token', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Stronghold-Request': '1',  // CSRF defense header
      },
      body: JSON.stringify({
        code: code,
        code_verifier: verifier,
        redirect_uri: location.origin + '/login/callback',
      }),
    });

    if (!resp.ok) {
      var errBody = await resp.json().catch(function() { return {}; });
      showMsg('Sign-in failed: ' + (errBody.detail || resp.status), 'error');
      document.getElementById('submit-btn').disabled = false;
      return;
    }

    var userData = await resp.json();

    // Clean up PKCE state
    sessionStorage.removeItem(PKCE_VERIFIER_KEY);
    sessionStorage.removeItem(PKCE_STATE_KEY);
    sessionStorage.removeItem(PKCE_REDIRECT_KEY);

    // Store session indicator (no token — it's in the HttpOnly cookie)
    localStorage.setItem(TOKEN_TYPE_KEY, 'oidc');
    localStorage.setItem(USER_KEY, userData.username || userData.user_id || '');

    location.href = redirect;
  } catch(e) {
    showMsg('Sign-in failed: ' + e.message, 'error');
    document.getElementById('submit-btn').disabled = false;
    console.error('BFF token exchange error:', e);
  }
}

// -- Tab switching --

function showTab(tab) {
  document.getElementById('section-login').classList.toggle('hidden', tab !== 'login');
  document.getElementById('section-register').classList.toggle('hidden', tab !== 'register');
  document.getElementById('tab-login').style.borderColor = tab === 'login' ? 'var(--gold-dim)' : 'var(--iron)';
  document.getElementById('tab-login').style.color = tab === 'login' ? 'var(--gold)' : 'var(--iron-light)';
  document.getElementById('tab-login').style.background = tab === 'login' ? 'rgba(226,165,41,0.1)' : 'transparent';
  document.getElementById('tab-register').style.borderColor = tab === 'register' ? 'var(--gold-dim)' : 'var(--iron)';
  document.getElementById('tab-register').style.color = tab === 'register' ? 'var(--gold)' : 'var(--iron-light)';
  document.getElementById('tab-register').style.background = tab === 'register' ? 'rgba(226,165,41,0.1)' : 'transparent';
  document.getElementById('msg-area').style.display = 'none';
}

// -- Login (approved users only, org/team from DB) --

async function submitLogin(e) {
  e.preventDefault();
  var email = document.getElementById('login-email').value.trim();
  var password = document.getElementById('login-password').value;
  if (!email) { showMsg('Please enter your email.', 'error'); return; }
  if (!password) { showMsg('Please enter your password.', 'error'); return; }

  document.getElementById('submit-btn').disabled = true;

  try {
    var resp = await fetch('/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Stronghold-Request': '1' },
      body: JSON.stringify({ email: email, password: password }),
    });

    if (!resp.ok) {
      var errBody = await resp.json().catch(function() { return {}; });
      showMsg(errBody.detail || 'Login failed', 'error');
      document.getElementById('submit-btn').disabled = false;
      return;
    }

    var userData = await resp.json();
    localStorage.setItem(TOKEN_TYPE_KEY, 'oidc');
    localStorage.setItem(USER_KEY, userData.username || userData.user_id || '');
    location.href = getRedirect();
  } catch(err) {
    showMsg('Login failed: ' + err.message, 'error');
    document.getElementById('submit-btn').disabled = false;
  }
}

// -- Register (request access) --

async function submitRegister(e) {
  e.preventDefault();
  var email = document.getElementById('reg-email').value.trim();
  var name = document.getElementById('reg-name').value.trim();
  var password = document.getElementById('reg-password').value;
  var org = document.getElementById('reg-org').value.trim();
  var team = document.getElementById('reg-team').value.trim() || 'default';

  if (!email) { showMsg('Please enter your email.', 'error'); return; }
  if (!password) { showMsg('Please choose a password.', 'error'); return; }
  if (!org) { showMsg('Please enter an organization.', 'error'); return; }

  document.getElementById('register-btn').disabled = true;

  try {
    var resp = await fetch('/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Stronghold-Request': '1' },
      body: JSON.stringify({ email: email, display_name: name, password: password, org_id: org, team_id: team }),
    });

    var body = await resp.json();
    if (!resp.ok) {
      showMsg(body.detail || 'Registration failed', 'error');
      document.getElementById('register-btn').disabled = false;
      return;
    }

    // Store email for return visits
    localStorage.setItem('sh_pending_email', email);

    // Replace register form with rich status card
    var section = document.getElementById('section-register');
    section.innerHTML = '<div style="text-align:center;padding:12px 0">'
      + '<div style="font-size:2.5rem;margin-bottom:12px">&#x1F3F0;</div>'
      + '<h3 style="font-family:Playfair Display,serif;color:var(--gold);font-size:1.2rem;margin-bottom:8px">Your Petition Has Been Sent</h3>'
      + '<p style="font-size:0.8rem;color:var(--iron-light);margin-bottom:16px">The castle stewards will review your request.</p>'
      + '<div style="background:rgba(226,165,41,0.08);border:1px solid var(--gold-dim);border-radius:8px;padding:16px;text-align:left;font-size:0.8rem">'
      + '<div style="color:var(--gold);font-weight:600;margin-bottom:8px">What happens next?</div>'
      + '<div style="color:var(--iron-light);line-height:1.8">'
      + '1. An administrator reviews your petition<br>'
      + '2. You receive approval (usually within a day)<br>'
      + '3. Return here and sign in with your credentials'
      + '</div></div>'
      + '<button onclick="checkApprovalStatus()" class="btn-sso" style="margin-top:16px;width:auto;padding:8px 20px">Check My Status</button>'
      + '<div id="status-result" style="margin-top:12px;font-size:0.8rem"></div>'
      + '</div>';
  } catch(err) {
    showMsg('Request failed: ' + err.message, 'error');
    document.getElementById('register-btn').disabled = false;
  }
}

// -- Check approval status (public endpoint, no auth) --

async function checkApprovalStatus() {
  var email = localStorage.getItem('sh_pending_email') || '';
  if (!email) { return; }
  var resultEl = document.getElementById('status-result');
  if (!resultEl) return;
  resultEl.textContent = 'Checking...';
  resultEl.style.color = 'var(--iron-light)';
  try {
    var resp = await fetch('/auth/registration-status?email=' + encodeURIComponent(email));
    var data = await resp.json();
    if (data.status === 'approved') {
      resultEl.innerHTML = '<span style="color:#4ade80">&#x2714; Approved! <a href="#" onclick="showTab(\'login\');return false" style="color:var(--gold)">Sign in</a> to enter the fortress.</span>';
      localStorage.removeItem('sh_pending_email');
    } else if (data.status === 'pending') {
      resultEl.innerHTML = '<span style="color:var(--gold)">&#x23F3; Still pending review. Check back later.</span>';
    } else if (data.status === 'rejected') {
      resultEl.innerHTML = '<span style="color:#ff6b6b">&#x2718; Your request was not approved. Contact an administrator.</span>';
      localStorage.removeItem('sh_pending_email');
    } else {
      resultEl.textContent = 'No registration found for this email.';
    }
  } catch(e) {
    resultEl.textContent = 'Unable to check status.';
    resultEl.style.color = 'var(--blood)';
  }
}

// -- Show status panel on return visit if pending --

(function() {
  var pendingEmail = localStorage.getItem('sh_pending_email');
  if (pendingEmail) {
    showTab('register');
    // Replace register form with status card
    var section = document.getElementById('section-register');
    section.innerHTML = '<div style="text-align:center;padding:12px 0">'
      + '<div style="font-size:2.5rem;margin-bottom:12px">&#x1F3F0;</div>'
      + '<h3 style="font-family:Playfair Display,serif;color:var(--gold);font-size:1.1rem;margin-bottom:8px">Awaiting Approval</h3>'
      + '<p style="font-size:0.8rem;color:var(--iron-light);margin-bottom:12px">Your petition for <strong>' + pendingEmail + '</strong> is being reviewed.</p>'
      + '<button onclick="checkApprovalStatus()" class="btn-sso" style="width:auto;padding:8px 20px">Check My Status</button>'
      + '<div id="status-result" style="margin-top:12px;font-size:0.8rem"></div>'
      + '</div>';
  }
})();

// -- Pre-fill email from Cloudflare Access JWT --

(function() {
  try {
    var cookies = document.cookie.split(';');
    for (var i = 0; i < cookies.length; i++) {
      var c = cookies[i].trim();
      if (c.startsWith('CF_Authorization=')) {
        var token = c.substring('CF_Authorization='.length);
        var payload = JSON.parse(atob(token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
        if (payload.email) {
          document.getElementById('login-email').value = payload.email;
          document.getElementById('reg-email').value = payload.email;
        }
        break;
      }
    }
  } catch(e) {}
})();

// -- API Key Login --

function submitApiKey(e) {
  e.preventDefault();
  var key = document.getElementById('api-key-input').value.trim();
  if (!key) {
    showMsg('Please enter an API key.', 'error');
    return;
  }

  localStorage.setItem(TOKEN_KEY, key);
  localStorage.setItem(TOKEN_TYPE_KEY, 'api_key');
  localStorage.setItem(USER_KEY, 'API Key User');
  location.href = getRedirect();
}
</script>
