# Vanilla Playwright fetcher — public tier browser backend for Ranger.
# ClusterIP ONLY. DO NOT add NodePort, Ingress, or LoadBalancer.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: playwright-fetcher
  namespace: stronghold-platform
  labels:
    app: playwright-fetcher
    tier: public
spec:
  replicas: 1
  selector:
    matchLabels:
      app: playwright-fetcher
  template:
    metadata:
      labels:
        app: playwright-fetcher
        tier: public
    spec:
      containers:
        - name: playwright-fetcher
          image: stronghold/playwright-fetcher:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: playwright-fetcher
  namespace: stronghold-platform
  labels:
    app: playwright-fetcher
spec:
  # ClusterIP ONLY — never expose externally.
  type: ClusterIP
  selector:
    app: playwright-fetcher
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
