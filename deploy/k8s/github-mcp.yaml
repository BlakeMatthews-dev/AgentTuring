apiVersion: apps/v1
kind: Deployment
metadata:
  name: github-mcp
  namespace: stronghold
spec:
  replicas: 1
  selector:
    matchLabels:
      app: github-mcp
  template:
    metadata:
      labels:
        app: github-mcp
    spec:
      containers:
        - name: github-mcp
          image: ghcr.io/modelcontextprotocol/server-github:latest
          ports:
            - containerPort: 3000
          env:
            - name: GITHUB_PERSONAL_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: github-pat
                  key: token
          args: ["--transport", "sse"]
---
apiVersion: v1
kind: Service
metadata:
  name: github-mcp
  namespace: stronghold
spec:
  selector:
    app: github-mcp
  ports:
    - port: 3000
      targetPort: 3000
