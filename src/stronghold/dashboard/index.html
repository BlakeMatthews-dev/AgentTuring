<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { createElement } from 'https://unpkg.com/react@18/umd/react.development.js';
        import { createRoot } from 'https://unpkg.com/react-dom@18/client/index.js';

        const LevelBadge = ({ level = 0 }) => {
            return createElement(
                'div',
                {
                    className: 'rounded-full bg-emerald-500 text-white font-bold px-4 py-2 inline-block'
                },
                `Level ${level}`
            );
        };

        export default LevelBadge;

        const App = () => {
            return createElement(
                'div',
                null,
                createElement(LevelBadge, { level: 1 })
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(createElement(App));
    </script>
</head>
<body class="p-4">
    <div id="root"></div>
</body>
</html>
