# Spec C: RCA feedback loop to OutcomeStore

issue_number: TBD
title: "Track success/failure of promoted learnings via mark_outcome feedback"
status: active
complexity: M

protocols_touched:
  - LearningStore

files_touched:
  - src/stronghold/types/memory.py
  - src/stronghold/protocols/memory.py
  - src/stronghold/memory/learnings/store.py
  - src/stronghold/agents/base.py
  - src/stronghold/agents/context_builder.py
  - tests/memory/test_learning_storage.py

acceptance_criteria:
  - "Learning dataclass gains success_after_use: int = 0 and failure_after_use: int = 0 fields"
  - "LearningStore protocol gains async mark_outcome(learning_ids: list[int], success: bool) -> None"
  - "InMemoryLearningStore.mark_outcome increments success_after_use if success else failure_after_use for each id"
  - "context_builder returns the list of injected_learning_ids (both promoted and matched) up the call stack to agent base"
  - "base.py, after outcome is recorded in step 11 (line ~454), calls learning_store.mark_outcome(injected_ids, success=outcome.success)"
  - "Learnings whose failure_after_use significantly exceeds success_after_use can be listed via a new LearningStore.list_ineffective(min_uses: int) -> list[Learning] read-only helper (for future demotion logic — not wired in v1)"

invariants:
  - name: counts_monotonic
    description: "success_after_use and failure_after_use only increase, never decrease"
    kind: postcondition
    expression: "after mark_outcome: count_new >= count_old"
    severity: critical

  - name: outcome_counts_learning
    description: "Each request that injected N learnings and succeeded produces exactly +1 on success_after_use for each of those N"
    kind: postcondition
    expression: "injected=[l1,l2]; success=True -> l1.success_after_use += 1 and l2.success_after_use += 1"
    severity: high

  - name: no_injection_no_change
    description: "A request that injected zero learnings leaves all counts untouched"
    kind: postcondition
    expression: "injected=[] -> no mark_outcome call, all learnings unchanged"
    severity: high

  - name: org_scoped
    description: "mark_outcome cannot cross org boundaries — ids not in the caller's org are ignored"
    kind: postcondition
    expression: "mark_outcome(ids_from_other_org) -> silently skipped, no cross-tenant mutation"
    severity: critical
