services:
  turing:
    build:
      context: .
      dockerfile: Dockerfile
    image: project-turing:latest
    container_name: turing
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "9100:9100"
    volumes:
      - turing-data:/data
      - ./scenarios:/app/scenarios:ro
      - ./config:/app/config:ro
    # Override at compose up time with: `docker compose run --rm turing <flags>`
    command:
      - "--use-fake-provider"
      - "--scenario"
      - "baseline"
      - "--metrics-port"
      - "9100"
      - "--journal-dir"
      - "/data/journal"

volumes:
  turing-data:
