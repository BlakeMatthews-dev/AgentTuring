apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  namespace: stronghold
spec:
  replicas: 1
  selector:
    matchLabels:
      app: litellm
  template:
    metadata:
      labels:
        app: litellm
    spec:
      containers:
        - name: litellm
          image: ghcr.io/berriai/litellm:main-v1.81.12-stable
          ports:
            - containerPort: 4000
          args: ["--config", "/app/config/litellm_config.yaml", "--port", "4000"]
          envFrom:
            - secretRef:
                name: litellm-secrets
          env:
            - name: LITELLM_MASTER_KEY
              value: sk-stronghold-litellm-demo
            - name: DATABASE_URL
              value: postgresql://stronghold:stronghold@postgres:5432/stronghold
          volumeMounts:
            - name: config
              mountPath: /app/config
      volumes:
        - name: config
          configMap:
            name: litellm-config
---
apiVersion: v1
kind: Service
metadata:
  name: litellm
  namespace: stronghold
spec:
  selector:
    app: litellm
  ports:
    - port: 4000
      targetPort: 4000
