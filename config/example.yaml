# Stronghold Example Config
# All values are examples — no real credentials

providers:
  mistral:
    status: active
    billing_cycle: monthly
    free_tokens: 1000000000
  google:
    status: active
    billing_cycle: daily
    free_tokens: 5000000
  cerebras:
    status: active
    billing_cycle: daily
    free_tokens: 1000000
  xai:
    status: active
    billing_cycle: monthly
    free_tokens: 750000000
    data_sharing: true
    data_sharing_notice: "xAI uses your API data to train Grok models when using the free credit program."

models:
  # ── Tier: Large (Gold) ── ~100x copper
  # Frontier reasoning models. Each request costs gold coins.
  # A typical 2K-token request costs ~3 gold = 300 copper.
  # Budget: save silver→gold over multiple days for occasional premium use.
  mistral-large:
    provider: mistral
    litellm_id: mistral/mistral-large-latest
    tier: large
    quality: 0.85
    speed: 80
    modality: text
    strengths: [code, reasoning, chat]
    coin_cost_base: 0.5
    coin_cost_base_denomination: gold
    coin_cost_per_1k_input: 1
    coin_cost_per_1k_input_denomination: gold
    coin_cost_per_1k_output: 2
    coin_cost_per_1k_output_denomination: gold
    coin_pricing_version: "2026-q1"

  # ── Tier: Medium (Silver) ── ~10x copper
  # Capable all-rounders. A typical 2K-token request costs ~4 silver = 40 copper.
  # With 50 copper/day you get ~1 medium request free, or convert & save.
  gemini-flash:
    provider: google
    litellm_id: gemini/gemini-2.5-flash
    tier: medium
    quality: 0.7
    speed: 300
    modality: text
    strengths: [chat, code, reasoning]
    coin_cost_base: 0.5
    coin_cost_base_denomination: silver
    coin_cost_per_1k_input: 1
    coin_cost_per_1k_input_denomination: silver
    coin_cost_per_1k_output: 2
    coin_cost_per_1k_output_denomination: silver
    coin_pricing_version: "2026-q1"

  # ── Tier: Small (Copper) ── baseline
  # Fast, cheap models for routine tasks. A typical 2K-token request costs ~4 copper.
  # With 50 copper/day you get ~12 small requests free.
  mistral-small:
    provider: mistral
    litellm_id: mistral/mistral-small-latest
    tier: small
    quality: 0.5
    speed: 200
    modality: text
    strengths: [chat]
    coin_cost_base: 0.5
    coin_cost_base_denomination: copper
    coin_cost_per_1k_input: 1
    coin_cost_per_1k_input_denomination: copper
    coin_cost_per_1k_output: 2
    coin_cost_per_1k_output_denomination: copper
    coin_pricing_version: "2026-q1"
  cerebras-llama:
    provider: cerebras
    litellm_id: cerebras/llama3.3-70b
    tier: small
    quality: 0.6
    speed: 2000
    modality: text
    strengths: [chat]
    coin_cost_base: 0.5
    coin_cost_base_denomination: copper
    coin_cost_per_1k_input: 1
    coin_cost_per_1k_input_denomination: copper
    coin_cost_per_1k_output: 2
    coin_cost_per_1k_output_denomination: copper
    coin_pricing_version: "2026-q1"

task_types:
  chat:
    keywords: [hello, hi, hey, thanks, how are you]
    min_tier: small
    preferred_strengths: [chat]
  code:
    keywords: [code, function, bug, error, implement, refactor, debug, fix]
    min_tier: medium
    preferred_strengths: [code]
  automation:
    keywords: [light, fan, turn on, turn off, chore, alexa]
    min_tier: small
    preferred_strengths: [chat]
  search:
    keywords: [search, look up, find, google, latest news]
    min_tier: small
    preferred_strengths: [chat]
  creative:
    keywords: [write, story, poem, creative, brainstorm]
    min_tier: small
    preferred_strengths: [creative]
  reasoning:
    keywords: [explain, why, analyze, reason, logic, prove, math]
    min_tier: large
    preferred_strengths: [reasoning]

routing:
  quality_weight: 0.6
  cost_weight: 0.4
  reserve_pct: 0.05
  priority_multipliers:
    low: 0.8
    normal: 1.0
    high: 1.2
    critical: 1.5

permissions:
  admin: ["*"]
  engineer: [web_search, file_ops, shell, git, test_runner]
  operator: [ha_control, ha_list_devices, ha_notify]
  viewer: [web_search]

sessions:
  max_messages: 20
  ttl_seconds: 86400

# ── Infrastructure ──
# Production: K8s + Helm. Docker Compose is local dev only.
database_url: ""  # postgresql://user:pass@postgres:5432/stronghold
redis_url: ""     # redis://redis:6379/0 — enables distributed sessions, rate limiting, cache
agents_dir: ""    # Path to GitAgent seed directory. Empty = auto-detect from package.

router_api_key: sk-example-stronghold
litellm_url: http://litellm:4000
litellm_key: sk-example-litellm
