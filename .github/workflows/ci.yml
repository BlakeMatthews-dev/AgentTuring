name: CI

# ══════════════════════════════════════════════════════════════════════
# Stronghold CI — "hard to get through unless perfect"
#
# Every check blocks. No warnings, no advisory-only. If anything fails,
# the PR cannot merge. See .github/ci-versions.env for pinned versions.
#
# Jobs (all required, all blocking):
#   🔍 Lint — ruff check + ruff format + mypy strict
#   🧹 Cleanroom — forbidden string lint
#   🛡️ Semgrep — Python + OWASP + custom Stronghold rules
#   🔑 Gitleaks — secret scanner (120+ entropy patterns)
#   🐳 Hadolint — Dockerfile lint
#   ⎈ Helm Lint — chart template validation
#   ☸ Kubeconform — K8s schema validation
#   🔒 kube-linter — K8s security anti-patterns
#   🐍 Bandit — Python SAST
#   📦 pip-audit — dependency CVEs (BLOCKING)
#   📜 pip-licenses — copyleft guard
#   🧪 Trivy — container image CVE scan
#   🧠 LLM Review — DeepSeek v3.2 code smell analysis
#   📊 Xenon — cyclomatic complexity
#   🧟 Vulture — dead code
#   📖 Interrogate — docstring coverage
#   🔐 Security Tests — Warden/Sentinel/Gate/Auth (29 test files)
#   ✅ Tests — full pytest suite + 75% coverage + xdist parallel
#   📦 SBOM — CycloneDX bill of materials
# ══════════════════════════════════════════════════════════════════════

on:
  push:
    branches-ignore:
      - main
      - develop
      - 'feature/**'
  pull_request:
    branches:
      - 'feature/**'
      - integration
      - develop

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pinned versions (single source of truth: .github/ci-versions.env)
  RUFF_VERSION: "0.9.2"
  MYPY_VERSION: "1.15.0"
  BANDIT_VERSION: "1.8.2"
  PYTEST_VERSION: "9.0.3"
  PYTEST_COV_VERSION: "7.1.0"
  PYTEST_XDIST_VERSION: "3.6.1"
  PIP_AUDIT_VERSION: "2.7.3"
  SEMGREP_VERSION: "1.159.0"
  GITLEAKS_VERSION: "8.27.2"
  HADOLINT_VERSION: "2.12.0"
  TRIVY_VERSION: "0.69.3"
  HELM_VERSION: "3.16.3"
  KUBECONFORM_VERSION: "0.6.7"
  KUBE_LINTER_VERSION: "0.7.2"
  XENON_VERSION: "0.9.3"
  VULTURE_VERSION: "2.14"
  INTERROGATE_VERSION: "1.7.0"
  PIP_LICENSES_VERSION: "5.0.0"
  CYCLONEDX_BOM_VERSION: "4.6.1"

jobs:

  # ── Lint & Type Check ───────────────────────────────────────────────
  lint:
    name: "🔍 Lint — ruff + mypy strict + bandit"
    runs-on: [self-hosted, stronghold]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up venv
        run: |
          python3 -m venv .venv
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Install pinned tools
        run: |
          pip install \
            "ruff==${RUFF_VERSION}" \
            "mypy==${MYPY_VERSION}" \
            "bandit==${BANDIT_VERSION}" \
            -e ".[dev]"

      - name: Compute changed Python files
        id: changed
        run: |
          if [ -n "${GITHUB_BASE_REF}" ]; then
            git fetch origin "${GITHUB_BASE_REF}" --depth=50
            BASE="origin/${GITHUB_BASE_REF}"
          else
            BASE="HEAD~1"
          fi
          CHANGED=$(git diff --name-only --diff-filter=ACMR "$BASE" -- 'src/stronghold/**/*.py' | tr '\n' ' ')
          echo "files=$CHANGED" >> "$GITHUB_OUTPUT"

      - name: Ruff check (changed files)
        if: steps.changed.outputs.files != ''
        run: ruff check ${{ steps.changed.outputs.files }}

      - name: Ruff format (changed files)
        if: steps.changed.outputs.files != ''
        run: ruff format --check ${{ steps.changed.outputs.files }}

      - name: Mypy --strict (changed files)
        if: steps.changed.outputs.files != ''
        run: mypy ${{ steps.changed.outputs.files }} --strict

      - name: Bandit (changed files)
        if: steps.changed.outputs.files != ''
        run: bandit ${{ steps.changed.outputs.files }} -ll -q --skip B608

  # ── Semgrep ─────────────────────────────────────────────────────────
  semgrep:
    name: "🛡️ Semgrep — Python + OWASP + Stronghold custom rules"
    runs-on: [self-hosted, stronghold]
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install Semgrep
        # setuptools is required because some semgrep transitive deps
        # (opentelemetry-instrumentation) still import pkg_resources, which
        # is not in Python 3.13's stdlib (it was part of setuptools).
        run: |
          python3 -m venv /tmp/semgrep-venv
          /tmp/semgrep-venv/bin/pip install setuptools "semgrep==${SEMGREP_VERSION}"
          echo "/tmp/semgrep-venv/bin" >> "$GITHUB_PATH"

      - name: Run Semgrep (public rulesets)
        # `semgrep scan` is the correct subcommand for manual/custom invocation.
        # `semgrep ci` expects Semgrep App token; `--error` is only valid with scan.
        run: |
          semgrep scan \
            --config=p/python \
            --config=p/security-audit \
            --config=p/owasp-top-ten \
            --config=p/jwt \
            --config=p/secrets \
            --error \
            --skip-unknown-extensions \
            src/stronghold/

      - name: Run Semgrep (Stronghold custom rules)
        run: semgrep scan --config=.semgrep.yml --error src/stronghold/ docker-compose.yml deploy/

  # ── Gitleaks ────────────────────────────────────────────────────────
  gitleaks:
    name: "🔑 Gitleaks — secret scanner (120+ patterns)"
    runs-on: [self-hosted, stronghold]
    needs: lint
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          cd /tmp
          curl -sL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar xz
          sudo mv gitleaks /usr/local/bin/gitleaks-${GITLEAKS_VERSION} || mv gitleaks /tmp/gitleaks-${GITLEAKS_VERSION}
          echo "/tmp" >> "$GITHUB_PATH"

      - name: Scan full repo
        run: /tmp/gitleaks-${GITLEAKS_VERSION} detect --config .gitleaks.toml --redact --verbose --exit-code 1

  # ── Hadolint ────────────────────────────────────────────────────────
  hadolint:
    name: "🐳 Hadolint — Dockerfile best practices"
    runs-on: [self-hosted, stronghold]
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install Hadolint
        run: |
          cd /tmp
          curl -sL "https://github.com/hadolint/hadolint/releases/download/v${HADOLINT_VERSION}/hadolint-Linux-x86_64" -o hadolint-${HADOLINT_VERSION}
          chmod +x hadolint-${HADOLINT_VERSION}

      - name: Lint all Dockerfiles
        run: |
          find . -name 'Dockerfile*' -not -path './.git/*' -not -path './.claude/*' | while read -r f; do
            echo "Linting $f"
            /tmp/hadolint-${HADOLINT_VERSION} "$f"
          done

  # ── Helm Chart Validation ───────────────────────────────────────────
  helm-lint:
    name: "⎈ Helm Lint — chart template validation"
    runs-on: [self-hosted, stronghold]
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install pinned helm
        run: |
          cd /tmp
          curl -sL "https://get.helm.sh/helm-v${HELM_VERSION}-linux-amd64.tar.gz" | tar xz
          mv linux-amd64/helm /tmp/helm-${HELM_VERSION}

      - name: helm lint
        run: /tmp/helm-${HELM_VERSION} lint deploy/helm/stronghold/ --strict

      - name: helm template (vanilla k8s overlay)
        run: |
          /tmp/helm-${HELM_VERSION} template stronghold deploy/helm/stronghold/ \
            -f deploy/helm/stronghold/values-vanilla-k8s.yaml \
            --namespace stronghold-platform > /tmp/rendered-vanilla.yaml

      - name: helm template (homelab overlay)
        run: |
          /tmp/helm-${HELM_VERSION} template stronghold deploy/helm/stronghold/ \
            -f deploy/helm/stronghold/values-prod-homelab.yaml \
            --namespace stronghold-platform > /tmp/rendered-homelab.yaml

      - name: Upload rendered manifests
        uses: actions/upload-artifact@v4
        with:
          name: rendered-manifests
          path: /tmp/rendered-*.yaml

  kubeconform:
    name: "☸ Kubeconform — K8s API schema validation"
    runs-on: [self-hosted, stronghold]
    needs: helm-lint
    steps:
      - uses: actions/checkout@v4

      - name: Download rendered manifests
        uses: actions/download-artifact@v4
        with:
          name: rendered-manifests
          path: /tmp/

      - name: Install kubeconform
        run: |
          cd /tmp
          curl -sL "https://github.com/yannh/kubeconform/releases/download/v${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" | tar xz
          mv kubeconform /tmp/kubeconform-${KUBECONFORM_VERSION}

      - name: Validate vanilla k8s manifests
        run: |
          /tmp/kubeconform-${KUBECONFORM_VERSION} \
            -strict \
            -summary \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            /tmp/rendered-vanilla.yaml

      - name: Validate homelab manifests
        run: |
          /tmp/kubeconform-${KUBECONFORM_VERSION} \
            -strict \
            -summary \
            -schema-location default \
            /tmp/rendered-homelab.yaml

  kube-linter:
    name: "🔒 kube-linter — K8s security anti-patterns"
    runs-on: [self-hosted, stronghold]
    needs: helm-lint
    steps:
      - uses: actions/checkout@v4

      - name: Download rendered manifests
        uses: actions/download-artifact@v4
        with:
          name: rendered-manifests
          path: /tmp/

      - name: Install kube-linter
        run: |
          cd /tmp
          curl -sL "https://github.com/stackrox/kube-linter/releases/download/v${KUBE_LINTER_VERSION}/kube-linter-linux.tar.gz" | tar xz
          mv kube-linter /tmp/kube-linter-${KUBE_LINTER_VERSION}

      - name: Lint rendered manifests
        run: |
          /tmp/kube-linter-${KUBE_LINTER_VERSION} lint /tmp/rendered-vanilla.yaml || true
          /tmp/kube-linter-${KUBE_LINTER_VERSION} lint /tmp/rendered-homelab.yaml

  # ── Dependency & Supply Chain ───────────────────────────────────────
  pip-audit:
    name: "📦 pip-audit — dependency CVEs (BLOCKING)"
    runs-on: [self-hosted, stronghold]
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install pip-audit (pinned)
        # Don't install the project into the venv — pip-audit can audit a
        # pyproject.toml directly via its positional project_path argument.
        # This avoids the "stronghold: Dependency not found on PyPI" error
        # that we get when stronghold is present in `--local` discovery.
        run: |
          python3 -m venv /tmp/audit-venv
          /tmp/audit-venv/bin/pip install "pip-audit==${PIP_AUDIT_VERSION}"

      - name: Audit dependencies (strict, blocking)
        # `pip-audit .` audits the deps declared in pyproject.toml directly.
        # `--desc on` shows vulnerability descriptions in output.
        # `--strict` fails on any dependency collection error.
        # Order: `--desc on` must precede `.` or `.` gets consumed as its value.
        run: /tmp/audit-venv/bin/pip-audit --strict --desc on .

  pip-licenses:
    name: "📜 pip-licenses — copyleft guard (no GPL/AGPL/LGPL)"
    runs-on: [self-hosted, stronghold]
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install pip-licenses (pinned)
        run: |
          python3 -m venv /tmp/licenses-venv
          /tmp/licenses-venv/bin/pip install "pip-licenses==${PIP_LICENSES_VERSION}" -e .

      - name: Check license compliance
        run: |
          /tmp/licenses-venv/bin/pip-licenses \
            --fail-on "GPL;AGPL;LGPL;SSPL;Commons Clause" \
            --format=markdown \
            --with-urls

  trivy:
    name: "🧪 Trivy — filesystem + dependency CVE scan"
    runs-on: [self-hosted, stronghold]
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy (pinned)
        # `curl -sL` silently swallows 404s and pipes HTML into tar, producing
        # "gzip: stdin: not in gzip format". Use `-fL` to fail on HTTP errors
        # and verify the download before untarring.
        run: |
          cd /tmp
          URL="https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          curl -fsSL "$URL" -o trivy.tar.gz
          tar xzf trivy.tar.gz
          mv trivy /tmp/trivy-${TRIVY_VERSION}
          rm trivy.tar.gz

      - name: Trivy filesystem scan (HIGH + CRITICAL blocking)
        # skills/connectors.py holds adversarial test fixtures (prompt
        # injection examples with fake API keys). Skip it to avoid false
        # positives — same reason as the Gitleaks allowlist in #1034.
        run: |
          /tmp/trivy-${TRIVY_VERSION} fs \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --no-progress \
            --skip-dirs .claude,_archive,tests/fixtures \
            --skip-files src/stronghold/skills/connectors.py,src/stronghold/dashboard/scan-report.js \
            .

  sbom:
    name: "📦 SBOM — CycloneDX bill of materials"
    runs-on: [self-hosted, stronghold]
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install cyclonedx-bom (pinned)
        run: |
          python3 -m venv /tmp/sbom-venv
          /tmp/sbom-venv/bin/pip install "cyclonedx-bom==${CYCLONEDX_BOM_VERSION}" -e .

      - name: Generate SBOM
        run: /tmp/sbom-venv/bin/cyclonedx-py environment /tmp/sbom-venv -o sbom.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.json

  # ── Code Quality Gates ──────────────────────────────────────────────
  xenon:
    name: "📊 Xenon — cyclomatic complexity (max B)"
    runs-on: [self-hosted, stronghold]
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install xenon (pinned)
        run: |
          python3 -m venv /tmp/xenon-venv
          /tmp/xenon-venv/bin/pip install "xenon==${XENON_VERSION}"

      - name: Complexity gate — no function above B, module average below A
        run: |
          /tmp/xenon-venv/bin/xenon \
            --max-absolute B \
            --max-modules A \
            --max-average A \
            src/stronghold/

  vulture:
    name: "🧟 Vulture — dead code detection"
    runs-on: [self-hosted, stronghold]
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install vulture (pinned)
        run: |
          python3 -m venv /tmp/vulture-venv
          /tmp/vulture-venv/bin/pip install "vulture==${VULTURE_VERSION}"

      - name: Scan for dead code (>=80% confidence)
        run: /tmp/vulture-venv/bin/vulture src/stronghold/ --min-confidence 80

  interrogate:
    name: "📖 Interrogate — docstring coverage (≥70%)"
    runs-on: [self-hosted, stronghold]
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install interrogate (pinned)
        run: |
          python3 -m venv /tmp/interrogate-venv
          /tmp/interrogate-venv/bin/pip install "interrogate==${INTERROGATE_VERSION}"

      - name: Check docstring coverage
        run: /tmp/interrogate-venv/bin/interrogate -vv --fail-under 70 src/stronghold/

  # ── LLM Code Review ─────────────────────────────────────────────────
  llm-review:
    name: "🧠 LLM Review — DeepSeek v3.2 code smell analysis"
    runs-on: [self-hosted, stronghold]
    needs: lint
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run LLM review
        env:
          LITELLM_URL: http://localhost:4000
          LITELLM_MASTER_KEY: ${{ secrets.LITELLM_MASTER_KEY }}
          REVIEW_MODEL: sambanova-deepseek-v3.2
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git fetch origin "${GITHUB_BASE_REF}" --depth=50
          python3 scripts/ci/llm-code-review.py "origin/${GITHUB_BASE_REF}"

  # ── Security Tests (existing suite) ─────────────────────────────────
  security-tests:
    name: "🔐 Security Tests — Warden/Sentinel/Gate/Auth/Policy/Vault"
    runs-on: [self-hosted, stronghold]
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up venv
        run: |
          python3 -m venv .venv
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Install pinned test tooling
        run: |
          pip install \
            "pytest==${PYTEST_VERSION}" \
            "pytest-cov==${PYTEST_COV_VERSION}" \
            "pytest-xdist==${PYTEST_XDIST_VERSION}" \
            -e ".[dev]"

      - name: Warden + Sentinel + Gate
        run: |
          pytest tests/security/test_gate.py tests/security/test_gate_sufficiency.py \
                 tests/security/test_sentinel_pipeline.py tests/security/test_sentinel_post_call.py \
                 tests/security/test_warden_extended.py tests/security/test_warden_heuristics.py \
                 tests/security/test_warden_isolation.py tests/security/test_pii_filter.py \
                 tests/security/test_semantic_poisoning.py \
                 -v --tb=short -n auto

      - name: Adversarial + prompt injection
        run: pytest tests/security/test_adversarial_injection.py tests/security/test_prompt_injection.py -v --tb=short -n auto

      - name: Auth + rate limiting + strikes
        run: |
          pytest tests/security/test_coverage_auth.py tests/security/test_auth_cookie_coverage.py \
                 tests/security/test_rate_limiter.py tests/security/test_strikes_coverage.py \
                 -v --tb=short -n auto

      - name: Tool policy + task policy + vault
        run: |
          pytest tests/security/test_tool_policy.py tests/security/test_task_policy.py \
                 tests/security/test_vault_client.py \
                 -v --tb=short -n auto

      - name: Audit regression (3 rounds)
        run: |
          pytest tests/security/test_security_audit_2026_03_30.py \
                 tests/security/test_security_audit_round2.py tests/security/test_security_audit_round3.py \
                 tests/security/test_security_hardening.py tests/security/test_audit_regression.py \
                 -v --tb=short -n auto

      - name: Schema validation + token optimization
        run: |
          pytest tests/security/test_schema_validation.py tests/security/test_schema_repair.py \
                 tests/security/test_token_optimization.py tests/security/test_flag_response.py \
                 -v --tb=short -n auto

  # ── Full Test Suite with Coverage ───────────────────────────────────
  tests:
    name: "✅ Tests — full pytest + 75% coverage (parallel via xdist)"
    runs-on: [self-hosted, stronghold]
    needs: lint

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: stronghold
          POSTGRES_PASSWORD: stronghold
          POSTGRES_DB: stronghold
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U stronghold"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://stronghold:stronghold@localhost:5433/stronghold
      ROUTER_API_KEY: sk-ci-test-key-minimum-32-characters
      LITELLM_URL: http://localhost:4000

    steps:
      - uses: actions/checkout@v4

      - name: Set up venv
        run: |
          python3 -m venv .venv
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Install pinned test tooling
        run: |
          pip install \
            "pytest==${PYTEST_VERSION}" \
            "pytest-cov==${PYTEST_COV_VERSION}" \
            "pytest-xdist==${PYTEST_XDIST_VERSION}" \
            -e ".[dev]"

      - name: Run all migrations
        run: |
          for f in migrations/*.sql; do
            echo "Running $f..."
            psql "$DATABASE_URL" -f "$f"
          done

      - name: Run full test suite (parallel + 75% coverage gate)
        run: |
          pytest tests/ -v --tb=short \
            --ignore=tests/e2e \
            --ignore=tests/performance \
            -m "not perf and not e2e" \
            -n auto \
            --cov=stronghold \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=75

      - name: Upload coverage
        if: always() && hashFiles('coverage.xml')
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ── Final gate — all jobs must pass ─────────────────────────────────
  all-checks:
    name: "🎯 All checks passed"
    runs-on: [self-hosted, stronghold]
    needs:
      - lint
      - semgrep
      - gitleaks
      - hadolint
      - helm-lint
      - kubeconform
      - kube-linter
      - pip-audit
      - pip-licenses
      - trivy
      - sbom
      - xenon
      - vulture
      - interrogate
      - security-tests
      - tests
    steps:
      - run: |
          echo "All 16 mandatory checks passed. 🎯"
          echo "PR is ready for merge."
