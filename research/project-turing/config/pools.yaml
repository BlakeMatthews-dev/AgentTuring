# Project Turing — production pools config
#
# Wired to the homelab LiteLLM proxy at :4000.
# One virtual key, one base URL, many pools.
# Each pool = a model + its free-tier window + quality_weight + role.
#
# Pools by purpose:
#   chat-cheapest  — bootstrap 200 Likert answers, bulk daydream
#   chat-fast      — daydreaming, journal summarization, RSS thinking
#   chat-quality   — chat replies, working memory maintenance, retest
#   chat-premium   — contradiction detection, deep reflection
#   embedding      — semantic retrieval (all memory queries)

pools:
  # --- Chat: cheapest (bootstrap, bulk daydream) ---------------------------
  - pool_name: chat-cheapest-groq
    model: groq-llama31-8b-instant
    window_kind: daily
    window_duration_seconds: 86400
    tokens_allowed: 131072
    quality_weight: 0.3
    role: chat

  - pool_name: chat-cheapest-cloudflare
    model: cloudflare-@cf/meta/llama31-8b-fp8
    window_kind: daily
    window_duration_seconds: 86400
    tokens_allowed: 100000
    quality_weight: 0.3
    role: chat

  # --- Chat: fast (daydreaming, journal, RSS) ------------------------------
  - pool_name: chat-fast-sambanova
    model: sambanova-llama33-70b
    window_kind: monthly
    window_duration_seconds: 2592000
    tokens_allowed: 10000000
    quality_weight: 0.6
    role: chat

  - pool_name: chat-fast-groq
    model: groq-llama33-70b
    window_kind: daily
