apiVersion: apps/v1
kind: Deployment
metadata:
  name: phoenix
  namespace: stronghold
spec:
  replicas: 1
  selector:
    matchLabels:
      app: phoenix
  template:
    metadata:
      labels:
        app: phoenix
    spec:
      containers:
        - name: phoenix
          image: arizephoenix/phoenix:latest
          ports:
            - containerPort: 6006
          env:
            - name: PHOENIX_SQL_DATABASE_URL
              value: postgresql://stronghold:stronghold@postgres:5432/phoenix
---
apiVersion: v1
kind: Service
metadata:
  name: phoenix
  namespace: stronghold
spec:
  type: NodePort
  selector:
    app: phoenix
  ports:
    - port: 6006
      targetPort: 6006
      nodePort: 30006
