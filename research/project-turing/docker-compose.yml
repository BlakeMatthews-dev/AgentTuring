services:
  turing:
    build:
      context: .
      dockerfile: Dockerfile
    image: project-turing:latest
    container_name: turing
    restart: unless-stopped
    user: "1000:1000"
    env_file:
      - .env
    environment:
      - TURING_METRICS_BIND=0.0.0.0
      - TURING_CHAT_BIND=0.0.0.0
    ports:
      - "9100:9100"
      - "9101:9101"
    volumes:
      - ./data:/data
      - ./scenarios:/app/scenarios:ro
      - ./config:/app/config:ro
    command:
      - "--use-fake-provider"
      - "--scenario"
      - "baseline"
      - "--metrics-port"
      - "9100"
      - "--chat-port"
      - "9101"
      - "--journal-dir"
      - "/data/journal"
