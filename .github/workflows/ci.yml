name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: stronghold
          POSTGRES_PASSWORD: stronghold
          POSTGRES_DB: stronghold
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://stronghold:stronghold@localhost:5432/stronghold
        run: |
          psql "$DATABASE_URL" -f migrations/001_initial.sql

      - name: Ruff check
        run: ruff check src/stronghold/

      - name: Ruff format
        run: ruff format --check src/stronghold/

      - name: Mypy
        run: mypy src/stronghold/ --strict

      - name: Bandit
        run: bandit -r src/stronghold/ -ll -q

      - name: Pytest
        env:
          DATABASE_URL: postgresql://stronghold:stronghold@localhost:5432/stronghold
        run: pytest tests/ -v --tb=short
