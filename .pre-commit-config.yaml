repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        args: [--strict, --ignore-missing-imports]
        additional_dependencies:
          - pydantic>=2.0.0
          - fastapi>=0.115.0
          - asyncpg>=0.31.0
          - PyJWT>=2.9.0
          - httpx>=0.28.0

  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        args: [-r, src/stronghold/, -ll, -q]

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: pytest tests/ -x -q --no-header
        language: system
        pass_filenames: false
        always_run: true
