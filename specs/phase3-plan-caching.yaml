# Spec 1012: Wire cache breakpoints into agent pipeline

issue_number: 1012
title: "Wire enable_cache_breakpoints into production agent pipeline"
status: active
complexity: S

protocols_touched:
  - ContextBuilder

files_touched:
  - src/stronghold/agents/base.py
  - src/stronghold/types/config.py
  - tests/agents/test_context_caching.py

acceptance_criteria:
  - "StrongholdConfig gains a cache_breakpoints_enabled: bool field (default False)"
  - "Agent.handle() passes enable_cache_breakpoints to ContextBuilder.build()"
  - "Config can be set via STRONGHOLD_CACHE_BREAKPOINTS env var"
  - "When enabled, all agent calls benefit from prompt caching"
  - "When disabled (default), behavior is unchanged"

invariants:
  - name: config_controls_caching
    description: "cache_breakpoints_enabled=True activates caching in build()"
    kind: postcondition
    expression: "config.cache_breakpoints_enabled -> system_msg is list"
    severity: high

  - name: default_off
    description: "Default config has cache_breakpoints_enabled=False"
    kind: postcondition
    expression: "StrongholdConfig().cache_breakpoints_enabled == False"
    severity: critical
